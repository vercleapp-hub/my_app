<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr Pay - الدخول للنظام</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-white">
    <div class="bg-slate-800 border border-slate-700 rounded-3xl shadow-2xl p-6 sm:p-8 max-w-lg w-full relative overflow-hidden max-h-[90vh] overflow-y-auto">
        
        <div class="text-center mb-6 relative z-10 flex flex-col items-center">
            <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4 border-4 border-slate-700">
                <i data-lucide="zap" class="text-white w-10 h-10"></i>
            </div>
            <h1 class="text-2xl font-bold text-white mb-1">مرحباً بك في دكتور باي!</h1>
            <p class="text-slate-400 font-medium text-xs">سجل دخول للمتابعة</p>
        </div>

        <div class="flex p-1 bg-slate-900 rounded-xl mb-6 relative z-10 border border-slate-700 hidden" id="tabs-container">
            <button onclick="toggleTab('login')" id="tab-login" class="flex-1 py-2 text-sm font-bold bg-slate-700 text-white rounded-lg transition-all shadow-sm">تسجيل الدخول</button>
            <button onclick="toggleTab('register')" id="tab-register" class="flex-1 py-2 text-sm font-bold text-slate-400 hover:text-white rounded-lg transition-all">حساب جديد</button>
        </div>

        <form id="login-form" class="space-y-4 relative z-10">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">رقم المحمول</label>
                <div class="relative">
                    <input type="text" id="log-phone" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-10 py-3 text-sm focus:border-blue-500 outline-none transition-all font-mono" placeholder="مثال: 01063151472">
                    <i data-lucide="phone" class="absolute right-3 top-3.5 w-4 h-4 text-slate-500"></i>
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">كلمة المرور</label>
                <div class="relative">
                    <input type="password" id="log-password" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-10 py-3 text-sm focus:border-blue-500 outline-none transition-all font-mono" placeholder="••••••••">
                    <i data-lucide="lock" class="absolute right-3 top-3.5 w-4 h-4 text-slate-500"></i>
                </div>
            </div>
            
            <div class="flex items-center justify-between mt-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="remember-me" class="w-4 h-4 rounded bg-slate-900 border-slate-700 text-blue-600 focus:ring-blue-500 focus:ring-offset-slate-800">
                    <span class="text-xs text-slate-400 font-bold">تذكرني</span>
                </label>
                <a href="#" class="text-xs font-bold text-blue-500 hover:text-blue-400 transition">نسيت كلمة المرور؟</a>
            </div>

            <button type="submit" id="log-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all text-sm shadow-lg shadow-blue-500/20">دخول</button>
            
            <div class="text-center mt-6">
                <button type="button" onclick="toggleTab('register')" class="text-sm font-bold text-slate-400 hover:text-white transition">انشاء حساب جديد</button>
            </div>
        </form>

        <form id="register-form" class="space-y-4 relative z-10 hidden">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-400 mb-1">الاسم بالكامل</label>
                    <input type="text" id="reg-name" required placeholder="أدخل الاسم ثلاثي كما في البطاقة" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">الرقم القومي</label>
                    <input type="text" id="reg-nid" required placeholder="مكون من 14 رقم" maxlength="14" minlength="14" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition-all font-mono">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">رقم المحمول</label>
                    <input type="tel" id="reg-phone" required placeholder="مثال: 01063151472" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition-all font-mono">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">البريد الإلكتروني</label>
                    <input type="email" id="reg-email" required placeholder="admin@drpay.com" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">كلمة المرور</label>
                    <input type="password" id="reg-password" onkeyup="checkPassStrength(this.value)" required placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition-all">
                    <div id="pass-strength" class="text-[10px] mt-1 font-bold transition-colors hidden"><span id="pass-msg">⚠️ ضعيفة</span></div>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-slate-400 mb-1">العنوان بالتفصيل</label>
                    <input type="text" id="reg-address" required placeholder="المحافظة - المدينة - الحي - الشارع - رقم المنزل" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:border-blue-500 outline-none transition-all">
                </div>
                
                <div class="md:col-span-2 grid grid-cols-2 gap-4 mt-2">
                    <div class="border-2 border-dashed border-slate-700 bg-slate-900/50 rounded-xl p-3 text-center cursor-pointer hover:border-blue-500 transition relative overflow-hidden group">
                        <input type="file" id="reg-id-front" accept="image/jpeg, image/png, image/webp" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="previewImage(this, 'preview-front')">
                        <div class="text-slate-500 group-hover:text-blue-400 transition" id="preview-front-icon">
                            <i data-lucide="image" class="w-6 h-6 mx-auto mb-2"></i>
                            <p class="text-[10px] font-bold text-slate-300">صورة البطاقة (الوجه)</p>
                            <p class="text-[8px] mt-1 text-slate-500">انقر أو اسحب لرفع الصورة</p>
                            <p class="text-[8px] uppercase text-slate-600 font-bold">الحد الأقصى 5MB</p>
                        </div>
                        <img id="preview-front" class="absolute inset-0 w-full h-full object-cover hidden">
                    </div>
                    <div class="border-2 border-dashed border-slate-700 bg-slate-900/50 rounded-xl p-3 text-center cursor-pointer hover:border-blue-500 transition relative overflow-hidden group">
                        <input type="file" id="reg-id-back" accept="image/jpeg, image/png, image/webp" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="previewImage(this, 'preview-back')">
                        <div class="text-slate-500 group-hover:text-blue-400 transition" id="preview-back-icon">
                            <i data-lucide="image" class="w-6 h-6 mx-auto mb-2"></i>
                            <p class="text-[10px] font-bold text-slate-300">صورة البطاقة (الظهر)</p>
                            <p class="text-[8px] mt-1 text-slate-500">انقر أو اسحب لرفع الصورة</p>
                            <p class="text-[8px] uppercase text-slate-600 font-bold">الحد الأقصى 5MB</p>
                        </div>
                        <img id="preview-back" class="absolute inset-0 w-full h-full object-cover hidden">
                    </div>
                </div>
            </div>
            
            <button type="submit" id="reg-btn" class="w-full mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 rounded-xl transition-all text-sm shadow-lg shadow-emerald-500/20 flex items-center justify-center gap-2">
                إنشاء الحساب <i data-lucide="user-plus" class="w-4 h-4"></i>
            </button>
        </form>

        <div id="result" class="mt-4 text-center hidden p-3 rounded-xl font-bold border border-red-500 text-red-400 bg-red-500/10 text-sm"></div>
    </div>
    
    <script>
        lucide.createIcons();

        function toggleTab(tab) {
            document.getElementById('result').classList.add('hidden');
            if(tab === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
                document.getElementById('tab-login').className = "flex-1 py-2 text-sm font-bold bg-slate-700 text-white rounded-lg transition-all shadow-sm";
                document.getElementById('tab-register').className = "flex-1 py-2 text-sm font-bold text-slate-400 hover:text-white rounded-lg transition-all";
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
                document.getElementById('tab-register').className = "flex-1 py-2 text-sm font-bold bg-slate-700 text-white rounded-lg transition-all shadow-sm";
                document.getElementById('tab-login').className = "flex-1 py-2 text-sm font-bold text-slate-400 hover:text-white rounded-lg transition-all";
            }
        }

        function checkPassStrength(val) {
            const ind = document.getElementById('pass-strength');
            const msg = document.getElementById('pass-msg');
            ind.classList.remove('hidden');
            if (val.length < 6) { ind.className = 'text-[10px] mt-1 font-bold text-red-400'; msg.textContent = '⚠️ كلمة مرور ضعيفة جداً'; }
            else if (val.length >= 8 && /[A-Z]/.test(val) && /[0-9]/.test(val)) { ind.className = 'text-[10px] mt-1 font-bold text-emerald-400'; msg.textContent = '✅ كلمة مرور قوية'; }
            else { ind.className = 'text-[10px] mt-1 font-bold text-yellow-500'; msg.textContent = '⚠️ كلمة مرور متوسطة'; }
            if(val === '') ind.classList.add('hidden');
        }

        function previewImage(input, previewId) {
            if (input.files && input.files[0]) {
                if (input.files[0].size > 5 * 1024 * 1024) { alert('الحد الأقصى لحجم الصورة هو 5 ميجابايت'); input.value = ''; return; }
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(previewId).src = e.target.result;
                    document.getElementById(previewId).classList.remove('hidden');
                    document.getElementById(previewId + '-icon').classList.add('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function resizeImage(file) {
            return new Promise((resolve, reject) => {
                if (!file) return resolve(null);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; // Optimize for web
                        let width = img.width; let height = img.height;
                        if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); // Compress to 60% quality base64 string
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        async function handleAuth(url, payload, btnId) {
            const btn = document.getElementById(btnId);
            const resultDiv = document.getElementById('result');
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin inline"></i> جاري التحقق...`;
            lucide.createIcons();
            resultDiv.classList.add('hidden');

            try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    localStorage.setItem('drpay_user', JSON.stringify(data.user));
                    localStorage.setItem('drpay_token', data.token);
                    if(data.user.role === 'admin' || data.user.role === 'employee') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    throw new Error(data.error || 'فشلت العملية');
                }
            } catch (err) {
                resultDiv.classList.remove('hidden');
                resultDiv.textContent = err.message || 'خطأ في الاتصال بالخادم';
                btn.disabled = false;
                if(btnId === 'log-btn') btn.innerHTML = 'دخول';
                else btn.innerHTML = 'إنشاء الحساب <i data-lucide="user-plus" class="w-4 h-4 inline"></i>';
                lucide.createIcons();
            }
        }

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const remember = document.getElementById('remember-me').checked;
            if(remember) localStorage.setItem('drpay_remember', 'true');
            handleAuth('/api?action=login', { identifier: document.getElementById('log-phone').value, password: document.getElementById('log-password').value }, 'log-btn');
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn');
            btn.disabled = true; btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin inline"></i> جاري الرفع والتسجيل...`; lucide.createIcons();
            
            // Base64 optimization
            const imgFrontBase64 = await resizeImage(document.getElementById('reg-id-front').files[0]);
            const imgBackBase64 = await resizeImage(document.getElementById('reg-id-back').files[0]);

            handleAuth('/api?action=register', { 
                name: document.getElementById('reg-name').value, 
                phone: document.getElementById('reg-phone').value, 
                email: document.getElementById('reg-email').value, 
                password: document.getElementById('reg-password').value,
                national_id: document.getElementById('reg-nid').value,
                address: document.getElementById('reg-address').value,
                id_front_image: imgFrontBase64,
                id_back_image: imgBackBase64
            }, 'reg-btn');
        });
    </script>
</body>
</html>
