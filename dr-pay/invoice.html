    <script>
        lucide.createIcons();
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        document.getElementById('inv-no').textContent = id || 'INV-2026-EXAMPLE';
        
        const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
        document.getElementById('inv-date').textContent = new Date().toLocaleString('ar-EG', options);
        
        let invoiceDataText = `ط¥ظٹطµط§ظ„ ط¯ظپط¹ Dr Pay\nط±ظ‚ظ… ط§ظ„ظپط§طھظˆط±ط©: ${id}\nط§ظ„طھط§ط±ظٹط®: ${new Date().toLocaleString('ar-EG', options)}`;

        async function fetchInvDetails() {
            try {
                // In a real PWA context, you'd fetch the specific invoice API.
                // Currently using transactions list to search.
                const res = await fetch('/api/index?action=index&action=transactions');
                const data = await res.json();
                if(data.success) {
                    const tx = data.transactions.find(t => t.invoice_no === id);
                    if(tx) {
                        const serviceName = tx.service_name + (tx.service_data?.ref_number ? ` (${tx.service_data.ref_number})` : '');
                        document.getElementById('inv-desc').textContent = serviceName;
                        document.getElementById('inv-amount').textContent = tx.total + ' ' + (tx.currency || 'ط¬.ظ…');
                        invoiceDataText += `\nط§ظ„ط®ط¯ظ…ط©: ${serviceName}\nط§ظ„ط¥ط¬ظ…ط§ظ„ظٹ: ${tx.total} ط¬.ظ…`;
                    }
                }
            } catch(e) {}
        }
        
        if(id) fetchInvDetails();

        async function shareInvoice() {
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'ط¥ظٹطµط§ظ„ ط¯ظپط¹ Dr Pay',
                        text: invoiceDataText,
                        url: window.location.href
                    });
                } catch(e) { console.log('Share failed', e); }
            } else {
                // Fallback to whatsapp direct link
                window.open(`https://wa.me/?text=${encodeURIComponent(invoiceDataText + '\n\n' + window.location.href)}`);
            }
        }
    </script>
