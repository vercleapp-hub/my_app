<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>Dr Pay App</title>
</head>
<body style="text-align:center; margin-top:50px; font-family:sans-serif;">

  <h1>🔥 أهلاً بيك في مشروع الدكتور باي</h1>
  <p>اضغط الزرار علشان نبعت بيانات لـ Supabase</p>

  <button onclick="sendMessage()">إرسال</button>

  <p id="result"></p>

  <script>
    async function sendMessage() {
      try {
        const res = await fetch('/api?text=hello_from_drpay');
        const data = await res.json();

        if (data.success) {
          document.getElementById('result').innerText = "تم الحفظ في Supabase ✅";
        } else {
          document.getElementById('result').innerText = "حصل خطأ ❌";
        }
      } catch (err) {
        document.getElementById('result').innerText = "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
